repo:
  name: akasha-forge
  ecosystem: akasha
  version: 0.1.0
  status: experimental

identity:
  role: forge
  layer: creation
  description: >
    Tool synthesis engine responsible for generating and evolving
    software artifacts within the Akasha ecosystem.

ownership:
  steward: human
  approval_required: true
  governance: akasha-axioms

interfaces:
  consumes:
    - akasha-world
    - akasha-constellation
    - akasha-lens
    - akasha-discovery

  produces:
    - generated-tools
    - repo-mutations
    - alignment-patches

capabilities:
  - tool_generation
  - code_synthesis
  - repo_transformation
  - template_expansion

inputs:
  artifact_types:
    - source_repo
    - binary
    - manifest
    - ontology_model

outputs:
  artifact_types:
    - repo
    - source_code
    - templates
    - patches

alignment:
  axioms_required: true
  canonical_structure: true
  naming_convention: akasha-world/NAMING.md

reflection:
  self_describing: true
  drift_detection: true
  quine_capable: true

dependencies:
  required_repos:
    - akasha-axioms
    - akasha-world
    - akasha-constellation

execution:
  runtime: human-in-the-loop
  automation_level: assisted

metadata:
  created_by: akasha
  maintained_by: steward
  purpose: >
    Enable structured creation and transformation of tools and
    repositories within the Akasha ecosystem.
